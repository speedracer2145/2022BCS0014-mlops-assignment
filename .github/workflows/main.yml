name: ML Pipeline

on: [push]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install "dvc[s3]"

    - name: Pull data
      run: dvc pull

    - name: Train model
      run: python train.py
